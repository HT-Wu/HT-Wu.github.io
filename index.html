<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaiTian (HT) Wu | Physics & Math</title>
    <style>
        :root { --text: #333; --link: #0066cc; --border: #efefef; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 750px; margin: 50px auto; padding: 0 20px; line-height: 1.6; color: var(--text); }
        header { display: flex; align-items: center; gap: 25px; margin-bottom: 35px; }
        .profile-pic { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; background: #eee; }
        .bio h1 { margin: 0 0 8px 0; font-size: 1.8rem; }
        .links a { margin-right: 15px; font-size: 0.95rem; text-decoration: none; color: var(--link); }
        .links a:hover { text-decoration: underline; }
        section { margin-bottom: 35px; }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; font-size: 1.3rem; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 12px; }
        
        /* Containers with customized scroll heights */
        .news-container {
            max-height: 180px; 
            overflow-y: auto;
            padding-right: 10px;
            border-left: 2px solid var(--border);
            padding-left: 15px;
        }
        .notes-container {
            max-height: 400px; 
            overflow-y: auto;
            padding-right: 10px;
        }
        
        /* Shared scrollbar cosmetics */
        .news-container::-webkit-scrollbar,
        .notes-container::-webkit-scrollbar {
            width: 4px;
        }
        .news-container::-webkit-scrollbar-thumb,
        .notes-container::-webkit-scrollbar-thumb {
            background-color: var(--border);
            border-radius: 4px;
        }
        
        .news-item {
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .news-date {
            font-weight: 600;
            font-size: 0.85rem;
            color: #666;
            margin-right: 8px;
            text-transform: uppercase;
        }
        .note-item {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .note-item a { font-weight: 500; color: var(--link); text-decoration: none; }
        .note-item a:hover { text-decoration: underline; }

        /* Auto System Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root { 
                --text: #e0e0e0; 
                --link: #4da6ff; /* High-contrast blue for dark mode readability */
                --border: #333; 
            }
            body { background-color: #121212; }
            h2 { color: #fff; }
            .news-date { color: #aaa; }
        }
    </style>
</head>
<body>

    <header>
        <img src="profile.jpg" alt="Profile" class="profile-pic" onerror="this.style.display='none'">
        <div class="bio">
            <h1>HaiTian (HT) Wu</h1>
            <p>Undergraduate physics and math student at Brown University. Interested in experimental condensed matter physics and quantum materials.</p>
            <div class="links">
                <a href="mailto:haitian_wu@brown.edu">haitian_wu@brown.edu</a>
                <a href="cv.pdf" target="_blank">CV</a>
                <a href="https://scholar.google.com/citations?user=N4jdFrQAAAAJ&hl=en" target="_blank">Google Scholar</a>
            </div>
        </div>
    </header>

    <section id="news">
        <h2>Recent Updates</h2>
        <div class="news-container" id="news-box">Loading updates...</div>
    </section>

    <section id="notes">
        <h2>Notes</h2>
        <div class="notes-container">
            <ul id="pdf-list">Loading published notes...</ul>
        </div>
    </section>

    <script>
        const repoOwner = 'HT-Wu';
        const repoName = 'HT-Wu.github.io';
        const folderPath = 'notes'; 

        // 1. ASYNC EXTERNAL NEWS PARSER
        async function loadNews() {
            const newsBox = document.getElementById('news-box');
            try {
                const res = await fetch('news.txt');
                if (!res.ok) throw new Error();
                const text = await res.text();
                
                const lines = text.split('\n').filter(line => line.trim() !== '');
                if (lines.length === 0) { newsBox.innerHTML = 'No recent updates.'; return; }
                
                newsBox.innerHTML = '';
                lines.forEach(line => {
                    const parts = line.split('|');
                    if (parts.length >= 2) {
                        const date = parts[0].trim();
                        const content = parts.slice(1).join('|').trim();
                        
                        const item = document.createElement('div');
                        item.className = 'news-item';
                        item.innerHTML = `<span class="news-date">${date}</span> ${content}`;
                        newsBox.appendChild(item);
                    }
                });
            } catch (e) {
                newsBox.innerHTML = 'Failed to load updates. Check news.txt formatting.';
            }
        }

        // 2. ASYNC NOTES DIRECTORY MATRIX
        async function fetchNotes() {
            const list = document.getElementById('pdf-list');
            try {
                const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                if (!res.ok) throw new Error();
                const files = await res.json();
                
                // Filter out non-PDF files and core document files
                const pdfs = files.filter(f => f.name.endsWith('.pdf') && f.name !== 'cv.pdf' && f.name !== 'resume.pdf').reverse();
                
                if (pdfs.length === 0) { list.innerHTML = '<li>No notes uploaded yet.</li>'; return; }
                
                list.innerHTML = '';
                pdfs.forEach(f => {
                    const li = document.createElement('li');
                    li.className = 'note-item';
                    
                    const pattern = /^(\d{4})(\d{2})(\d{2})_(.*?)(?:--([a-zA-Z0-9]+))?\.pdf$/;
                    const match = f.name.match(pattern);
                    
                    let displayTitle = f.name.replace('.pdf', '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    let dateBadge = '';
                    let tagBadge = '';
                
                    if (match) {
                        const year = match[1];
                        const month = match[2];
                        const day = match[3];
                        const rawTitle = match[4];
                        const tag = match[5];
                
                        // Format Date
                        const dateObj = new Date(`${year}-${month}-${day}T00:00:00`);
                        const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        dateBadge = `<span style="color: #666; font-size: 0.9rem; min-width: 95px; font-variant-numeric: tabular-nums;">${formattedDate}</span>`;
                
                        // Clean Title (Converts triple hyphens '---' into colons before handling casing transformations)
                        let stringWithColon = rawTitle.replace(/---/g, ': ');
                        displayTitle = stringWithColon.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                
                        // Format Tag Badge
                        if (tag) {
                            const colors = {
                                physics: { bg: '#eef2ff', text: '#4f46e5' },
                                math: { bg: '#ecfdf5', text: '#059669' },
                                other: { bg: '#fff7ed', text: '#ea580c' }
                            };
                            const pair = colors[tag.toLowerCase()] || { bg: '#f3f4f6', text: '#4b5563' };
                            tagBadge = `<span style="background: ${pair.bg}; color: ${pair.text}; font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;">${tag}</span>`;
                        }
                    }
                
                    const a = document.createElement('a');
                    a.href = `${folderPath}/${f.name}`; 
                    a.textContent = displayTitle;
                
                    li.innerHTML = dateBadge;
                    li.appendChild(a);
                    if (tagBadge) {
                        li.insertAdjacentHTML('beforeend', tagBadge);
                    }
                    list.appendChild(li);
                });
            } catch (e) {
                list.innerHTML = '<li>Error loading directory listing.</li>';
            }
        }

        // Initialize execution sequences
        loadNews();
        fetchNotes();
    </script>
</body>
</html>
