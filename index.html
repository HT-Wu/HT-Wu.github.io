<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaiTian (HT) Wu | Physics & Math</title>
    <style>
        :root { --text: #333; --link: #0066cc; --border: #efefef; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 750px; margin: 50px auto; padding: 0 20px; line-height: 1.6; color: var(--text); }
        header { display: flex; align-items: center; gap: 25px; margin-bottom: 35px; }
        .profile-pic { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; background: #eee; }
        .bio h1 { margin: 0 0 8px 0; font-size: 1.8rem; }
        .links a { margin-right: 15px; font-size: 0.95rem; text-decoration: none; color: var(--link); }
        .links a:hover { text-decoration: underline; }
        section { margin-bottom: 35px; }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; font-size: 1.3rem; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 12px; }
        .note-item a { font-weight: 500; color: var(--link); text-decoration: none; }
        .note-item a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <img src="profile.jpg" alt="Profile" class="profile-pic" onerror="this.style.display='none'">
        <div class="bio">
            <h1>HaiTian (HT Wu)</h1>
            <p>Undergraduate Physics Student. Interested in experimental condensed matter physics and quantum hardware platforms.</p>
            <div class="links">
                <a href="mailto:haitian_wu@brown.edu">Email</a>
                <a href="https://scholar.google.com/citations?user=N4jdFrQAAAAJ&hl=en" target="_blank">Google Scholar</a>
                <a href="https://github.com/HT-Wu" target="_blank">GitHub</a>
            </div>
        </div>
    </header>

    <section>
        <h2>Notes & Journal</h2>
        <ul id="pdf-list">Loading published notes...</ul>
    </section>

    <script>
        const repoOwner = 'HT-Wu';
        const repoName = 'HT-Wu.github.io';
        const folderPath = 'notes'; // <-- Add your folder name here

        async function fetchNotes() {
            const list = document.getElementById('pdf-list');
            try {
                // Updated URL to append the folder path
                const res = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                if (!res.ok) throw new Error();
                const files = await res.json();
                
                const pdfs = files.filter(f => f.name.endsWith('.pdf'));
                if (pdfs.length === 0) { list.innerHTML = '<li>No notes uploaded yet.</li>'; return; }
                
                list.innerHTML = '';
                pdfs.forEach(f => {
                    const li = document.createElement('li');
                    li.className = 'note-item';
                    const a = document.createElement('a');
                    // Point the link to the relative folder path
                    a.href = `${folderPath}/${f.name}`;
                    a.textContent = f.name.replace('.pdf', '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    li.appendChild(a);
                    list.appendChild(li);
                });
            } catch (e) {
                list.innerHTML = '<li>Error loading directory listing.</li>';
            }
        }
        fetchNotes();
    </script>
</body>
</html>
